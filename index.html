<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    min-height: 100vh;

    background-image:
        linear-gradient(
            rgba(255,250,243,0.8),
            rgba(255,250,243,0.8)
        ),
        url("background.png");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}
h1 {
    margin-top: 25px;
    font-size: 32px;
    font-family: 'Great Vibes', cursive;
    color: #b89b3c;
    text-shadow: 2px 2px 6px rgba(255,255,255,0.9);
}
/* Container controls size */
.container {
    position: relative;
    width: 320px;
    height: 320px;
    margin: 30px auto 10px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    border: 1.5px solid #e6c76e;
}

/* Image fits perfectly */
.container img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* THIS fixes “too big” / weird scaling */
    display: block;
}

/* Canvas overlays image */
canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* Bottom text */
.subtitle {
    font-size: 18px;
    margin-top: 15px;
    background: rgba(255,255,255,0.65);
    display: inline-block;
    padding: 8px 18px;
    border-radius: 14px;
}

.subtitle span {
    display: block;
    font-family: 'Dancing Script', cursive;
    font-size: 28px;
    color: #b89b3c;
    margin-bottom: 5px;
    text-shadow: 2px 2px 6px rgba(255,255,255,0.9);
}
</style>
</head>
<body>
</body>
</html>
